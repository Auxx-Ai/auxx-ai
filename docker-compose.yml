# docker-compose.yml
# Production Docker Compose configuration

services:
  # PostgreSQL Database with pgvector
  postgres:
    image: ankane/pgvector:latest
    container_name: auxx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-c2J-k5wYf5CxmJDU}
      POSTGRES_DB: auxx-ai
    ports:
      - '${DATABASE_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auxx-network

  # Redis Cache
  redis:
    image: redis:alpine
    container_name: auxx-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-c2J-k5wYf5CxmJDU}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auxx-network

  # Web Application (Production)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.optimized
    container_name: auxx-web
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${DATABASE_PASSWORD:-c2J-k5wYf5CxmJDU}@postgres:5432/auxx-ai
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-c2J-k5wYf5CxmJDU}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auxx-network
    command: sh -c "node apps/web/server.js"

  # Worker Service (Production)
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: auxx-worker
    restart: unless-stopped
    ports:
      - '${WORKER_PORT:-8080}:8080'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${DATABASE_PASSWORD:-c2J-k5wYf5CxmJDU}@postgres:5432/auxx-ai
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-c2J-k5wYf5CxmJDU}
      NODE_ENV: production
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auxx-network

  # Knowledge Base (KB) Application (Production)
  kb:
    build:
      context: .
      dockerfile: apps/kb/Dockerfile
    container_name: auxx-kb
    restart: unless-stopped
    ports:
      - '${KB_PORT:-3002}:3002'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${DATABASE_PASSWORD:-c2J-k5wYf5CxmJDU}@postgres:5432/auxx-ai
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-c2J-k5wYf5CxmJDU}
      NODE_ENV: production
      PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auxx-network
    command: sh -c "node apps/kb/server.js"

  # Documentation Site (Production)
  docs:
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
    container_name: auxx-docs
    restart: unless-stopped
    ports:
      - '${DOCS_PORT:-3004}:3004'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3004
    networks:
      - auxx-network

volumes:
  postgres_data:
  redis_data:

networks:
  auxx-network:
    driver: bridge
