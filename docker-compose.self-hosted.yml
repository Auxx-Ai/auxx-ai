# docker-compose.self-hosted.yml
# Self-hosted Auxx.ai deployment with Traefik reverse proxy and auto SSL.
# Pre-built images from GHCR. S3 storage is user-provided.
#
# Environment loading order:
# 1. .env file (if exists) — generated by ./setup.sh --self-hosted from .env.example
# 2. environment: section below — overrides/additions for this service
# 3. Required vars use ${VAR:?error message} syntax for fail-fast
#
# Usage:
#   docker compose -f docker-compose.self-hosted.yml up -d

x-common-env: &common-env
  DEPLOYMENT_MODE: self-hosted
  NODE_ENV: production
  IS_CONFIG_VARIABLES_IN_DB_ENABLED: "true"
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Run ./setup.sh to generate secrets}
  WORKFLOW_CREDENTIAL_ENCRYPTION_KEY: ${WORKFLOW_CREDENTIAL_ENCRYPTION_KEY:?Run ./setup.sh --self-hosted to generate secrets}
  PUBLIC_WORKFLOW_JWT_SECRET: ${PUBLIC_WORKFLOW_JWT_SECRET:?Run ./setup.sh --self-hosted to generate secrets}
  API_KEY_SALT: ${API_KEY_SALT:?Run ./setup.sh to generate secrets}
  LAMBDA_INVOKE_SECRET: ${LAMBDA_INVOKE_SECRET:?Run ./setup.sh to generate secrets}
  SDK_CLIENT_SECRET: ${SDK_CLIENT_SECRET:?Run ./setup.sh to generate secrets}

x-db-env: &db-env
  DATABASE_URL: postgresql://postgres:${DATABASE_PASSWORD:?Set DATABASE_PASSWORD}@postgres:5432/auxx-ai

x-redis-env: &redis-env
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
  CACHE_PROVIDER: hosted

x-url-env: &url-env
  DOMAIN: ${DOMAIN}
  APP_URL: https://app.${DOMAIN}
  HOMEPAGE_URL: https://${DOMAIN}
  API_URL: https://api.${DOMAIN}
  # build and docs are not included in self-hosted

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"

services:
  # ---- Infrastructure ----

  traefik:
    image: traefik:v3.4
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt
    networks:
      - auxx-network
    restart: unless-stopped
    <<: *default-logging

  postgres:
    image: pgvector/pgvector:0.8.0-pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: auxx-ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    networks:
      - auxx-network
    restart: unless-stopped
    <<: *default-logging

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a ${REDIS_PASSWORD} ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - auxx-network
    restart: unless-stopped
    <<: *default-logging

  # ---- Init ----

  migrate:
    image: ghcr.io/auxx-ai/web:${VERSION:-latest}
    command: ["npx", "drizzle-kit", "migrate"]
    working_dir: /app/packages/database
    environment:
      <<: [*db-env]
    depends_on:
      postgres: { condition: service_healthy }
    networks:
      - auxx-network
    restart: "no"

  # ---- Application Services ----

  web:
    image: ghcr.io/auxx-ai/web:${VERSION:-latest}
    env_file:
      - path: .env
        required: false
    environment:
      <<: [*common-env, *db-env, *redis-env, *url-env]
      PORT: ${APP_PORT:-3000}
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:${APP_PORT:-3000}/health || exit 1']
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`app.${DOMAIN}`)
      - traefik.http.routers.web.tls.certresolver=letsencrypt
      - traefik.http.services.web.loadbalancer.server.port=${APP_PORT:-3000}
      # Redirect root domain to app subdomain
      - traefik.http.routers.root.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.root.tls.certresolver=letsencrypt
      - traefik.http.routers.root.middlewares=root-redirect
      - traefik.http.middlewares.root-redirect.redirectregex.regex=^https://${DOMAIN}(.*)
      - traefik.http.middlewares.root-redirect.redirectregex.replacement=https://app.${DOMAIN}$${1}
      - traefik.http.middlewares.root-redirect.redirectregex.permanent=true
    networks:
      - auxx-network
    restart: unless-stopped
    <<: *default-logging

  api:
    image: ghcr.io/auxx-ai/api:${VERSION:-latest}
    env_file:
      - path: .env
        required: false
    environment:
      <<: [*common-env, *db-env, *redis-env, *url-env]
      PORT: ${API_PORT:-3007}
      LAMBDA_EXECUTOR_URL: http://lambda:${LAMBDA_PORT:-3008}
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:${API_PORT:-3007}/health || exit 1']
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`api.${DOMAIN}`)
      - traefik.http.routers.api.tls.certresolver=letsencrypt
      - traefik.http.services.api.loadbalancer.server.port=${API_PORT:-3007}
    networks:
      - auxx-network
    restart: unless-stopped
    <<: *default-logging

  worker:
    image: ghcr.io/auxx-ai/worker:${VERSION:-latest}
    env_file:
      - path: .env
        required: false
    environment:
      <<: [*common-env, *db-env, *redis-env, *url-env]
      WORKER_PORT: ${WORKER_PORT:-3005}
      LAMBDA_EXECUTOR_URL: http://lambda:${LAMBDA_PORT:-3008}
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:${WORKER_PORT:-3005}/health || exit 1']
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    networks:
      - auxx-network
    restart: unless-stopped
    <<: *default-logging

  lambda:
    image: ghcr.io/auxx-ai/lambda-server:${VERSION:-latest}
    env_file:
      - path: .env
        required: false
    environment:
      PORT: ${LAMBDA_PORT:-3008}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      AWS_REGION: ${S3_REGION}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      BUNDLES_BUCKET_NAME: ${S3_PRIVATE_BUCKET}
      LAMBDA_API_URL: http://api:${API_PORT:-3007}
      LAMBDA_INVOKE_SECRET: ${LAMBDA_INVOKE_SECRET:?Run ./setup.sh to generate secrets}
    depends_on:
      api: { condition: service_healthy }
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:${LAMBDA_PORT:-3008}/health || exit 1']
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    networks:
      - auxx-network
    restart: unless-stopped
    <<: *default-logging

volumes:
  postgres_data:
  redis_data:
  letsencrypt_data:

networks:
  auxx-network:
    driver: bridge
