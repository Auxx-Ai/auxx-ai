name: SST Remove

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Stage to remove (dev/prod)"
        type: choice
        required: true
        default: dev
        options:
          - dev
          - prod
      region:
        description: "AWS region"
        type: string
        required: true
        default: us-west-1
      remove_app:
        description: "Remove app stack (root)"
        type: boolean
        required: true
        default: true
      remove_infra:
        description: "Remove infra stack (infra/infra-sst)"
        type: boolean
        required: true
        default: true
      cleanup_ecr:
        description: "Also delete ECR repo 'sst-asset' (force)"
        type: boolean
        required: false
        default: false

jobs:
  remove:
    name: Remove SST stacks
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.stage }}
    permissions:
      id-token: write
      contents: read
    env:
      STAGE: ${{ github.event.inputs.stage }}
      AWS_REGION: ${{ github.event.inputs.region }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::716542960845:role/AuxxGithubDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: pnpm i --frozen-lockfile=false

      - name: Grant temporary IAM permissions for removal
        run: |
          cat > /tmp/auxx-temp-removal-policy.json << 'JSON'
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Action": [
                  "iam:ListInstanceProfilesForRole",
                  "iam:ListInstanceProfiles",
                  "iam:RemoveRoleFromInstanceProfile",
                  "iam:DeleteInstanceProfile"
                ],
                "Resource": "*"
              }
            ]
          }
          JSON
          aws iam put-role-policy \
            --role-name AuxxGithubDeployRole \
            --policy-name AuxxTempRemovalPolicy \
            --policy-document file:///tmp/auxx-temp-removal-policy.json

      - name: Repair missing S3 buckets (best-effort)
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set +e
          STACK_NAME="auxx-ai-${STAGE}"
          BUCKETS=$(aws cloudformation describe-stack-resources --stack-name "$STACK_NAME" \
            --query 'StackResources[?ResourceType==`AWS::S3::Bucket`].PhysicalResourceId' \
            --output text 2>/dev/null || true)
          for B in $BUCKETS; do
            if [ -z "$B" ] || [ "$B" = "None" ]; then continue; fi
            echo "Checking bucket: $B"
            aws s3api head-bucket --bucket "$B" >/dev/null 2>&1
            if [ $? -ne 0 ]; then
              echo "Bucket $B is missing; recreating to unblock deletion"
              aws s3api create-bucket --bucket "$B" --region "$AWS_REGION" \
                --create-bucket-configuration LocationConstraint="$AWS_REGION" || true
            fi
          done

      - name: Print app stacks (pre)
        run: pnpm sst:stacks || true

      - name: Remove app stack (root)
        if: ${{ fromJSON(github.event.inputs.remove_app) }}
        run: pnpm sst:remove

      - name: Remove infra stack (infra/infra-sst)
        if: ${{ fromJSON(github.event.inputs.remove_infra) }}
        working-directory: infra/infra-sst
        run: pnpm sst:remove

      - name: Print stacks (post)
        run: |
          echo "Remaining stacks in $AWS_REGION after removal:"
          aws cloudformation list-stacks --stack-status-filter CREATE_COMPLETE UPDATE_COMPLETE ROLLBACK_COMPLETE --query 'StackSummaries[].StackName' --output table

      - name: Revoke temporary IAM permissions
        if: always()
        run: |
          aws iam delete-role-policy --role-name AuxxGithubDeployRole --policy-name AuxxTempRemovalPolicy || true

      - name: Delete ECR repository 'sst-asset' (optional)
        if: ${{ fromJSON(github.event.inputs.cleanup_ecr) }}
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -e
          echo "Deleting ECR repo 'sst-asset' (if exists) in $AWS_REGION"
          aws ecr delete-repository --repository-name sst-asset --force --region "$AWS_REGION" || echo "Repo not found; nothing to delete."
