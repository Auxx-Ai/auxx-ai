# .github/workflows/sdk-publish.yml
name: Publish @auxx/sdk

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
          - custom
      custom-version:
        description: "Custom version (only when bump = custom, e.g. 0.2.0-beta.1)"
        required: false
        type: string
      tag:
        description: "npm dist-tag"
        required: false
        type: choice
        default: latest
        options:
          - latest
          - beta
          - experimental
          - next
      dry-run:
        description: "Dry run (build + pack, skip publish)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version
        working-directory: packages/sdk
        run: |
          if [ "${{ inputs.bump }}" = "custom" ]; then
            npm version "${{ inputs.custom-version }}" --no-git-tag-version
          elif [ "${{ inputs.bump }}" = "prerelease" ]; then
            npm version prerelease --preid="${{ inputs.tag }}" --no-git-tag-version
          else
            npm version "${{ inputs.bump }}" --no-git-tag-version
          fi
          echo "SDK_VERSION=$(node -p 'require("./package.json").version')" >> "$GITHUB_ENV"

      - name: Build
        working-directory: packages/sdk
        run: pnpm run build

      - name: Verify package contents
        working-directory: packages/sdk
        run: npm pack --dry-run

      - name: Publish to npm
        if: ${{ !inputs.dry-run }}
        working-directory: packages/sdk
        run: npm publish --provenance --access public --tag ${{ inputs.tag }}

      - name: Commit version bump & tag
        if: ${{ !inputs.dry-run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/sdk/package.json
          git commit -m "chore(sdk): release @auxx/sdk@${SDK_VERSION}"
          git tag "sdk-v${SDK_VERSION}"
          git push origin main --tags

      - name: Create GitHub Release
        if: ${{ !inputs.dry-run }}
        run: |
          gh release create "sdk-v${SDK_VERSION}" \
            --title "@auxx/sdk v${SDK_VERSION}" \
            --notes "Published \`@auxx/sdk@${SDK_VERSION}\` to npm with dist-tag \`${{ inputs.tag }}\`" \
            --target main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
