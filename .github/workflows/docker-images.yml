# .github/workflows/docker-images.yml
name: Docker Images

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/docker-images.yml'
      - 'docker-entrypoint.sh'
      - 'apps/**/Dockerfile*'
      - 'apps/**/src/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish images to GHCR'
        required: true
        default: false
        type: boolean
      image:
        description: 'Image to process'
        required: true
        default: all
        type: choice
        options:
          - all
          - web
          - api
          - build
          - worker
          - lambda
          - lambda-server
          - homepage
          - docs

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            file: apps/web/Dockerfile
            image: ghcr.io/auxx-ai/web
          - name: api
            file: apps/api/Dockerfile
            image: ghcr.io/auxx-ai/api
          - name: build
            file: apps/build/Dockerfile
            image: ghcr.io/auxx-ai/build
          - name: worker
            file: apps/worker/Dockerfile
            image: ghcr.io/auxx-ai/worker
          - name: lambda
            file: apps/lambda/Dockerfile
            image: ghcr.io/auxx-ai/lambda
          - name: lambda-server
            file: apps/lambda/Dockerfile.server
            image: ghcr.io/auxx-ai/lambda-server
          - name: homepage
            file: apps/homepage/Dockerfile
            image: ghcr.io/auxx-ai/homepage
          - name: docs
            file: apps/docs/Dockerfile
            image: ghcr.io/auxx-ai/docs

    steps:
      - name: Skip non-selected image
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image != 'all' && github.event.inputs.image != matrix.name }}
        run: |
          echo "Skipping ${{ matrix.name }} (selected: ${{ github.event.inputs.image }})"

      - name: Free disk space
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.image == 'all' || github.event.inputs.image == matrix.name }}
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h /

      - name: Checkout
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.image == 'all' || github.event.inputs.image == matrix.name }}
        uses: actions/checkout@v6

      - name: Validate compose files
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.image == 'all' || github.event.inputs.image == matrix.name }}
        run: |
          docker compose config -q
          docker compose -f docker-compose.self-hosted.yml config -q
        env:
          DATABASE_PASSWORD: test
          REDIS_PASSWORD: test
          BETTER_AUTH_SECRET: test
          WORKFLOW_CREDENTIAL_ENCRYPTION_KEY: test
          PUBLIC_WORKFLOW_JWT_SECRET: test
          API_KEY_SALT: test
          LAMBDA_INVOKE_SECRET: test
          SDK_CLIENT_SECRET: test
          LOGIN_TOKEN_PRIVATE_KEY: test
          LOGIN_TOKEN_PUBLIC_KEY: test
          BUILD_SESSION_SECRET: test
          S3_REGION: us-east-1
          S3_ACCESS_KEY_ID: test
          S3_SECRET_ACCESS_KEY: test
          S3_PUBLIC_BUCKET: test
          S3_PRIVATE_BUCKET: test
          DOMAIN: example.com
          ACME_EMAIL: test@example.com

      - name: Validate build inputs
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.image == 'all' || github.event.inputs.image == matrix.name }}
        run: |
          test -f pnpm-lock.yaml
          test -f "${{ matrix.file }}"

      - name: Set up Docker Buildx
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.image == 'all' || github.event.inputs.image == matrix.name }}
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.image == 'all' || github.event.inputs.image == matrix.name }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.image == 'all' || github.event.inputs.image == matrix.name }}
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true' }}
            type=sha,prefix=sha-

      - name: Read app version
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.image == 'all' || github.event.inputs.image == matrix.name }}
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Set build time
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.image == 'all' || github.event.inputs.image == matrix.name }}
        id: build_time
        run: echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and optionally push
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.image == 'all' || github.event.inputs.image == matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64
          pull: true
          push: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            APP_VERSION=${{ steps.version.outputs.version }}
            BUILD_TIME=${{ steps.build_time.outputs.build_time }}
            POSTHOG_KEY=${{ vars.POSTHOG_KEY }}
            POSTHOG_HOST=${{ vars.POSTHOG_HOST }}
          cache-from: type=registry,ref=${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ matrix.image }}:buildcache,mode=max
