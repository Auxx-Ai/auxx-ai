# .github/workflows/release-please.yml
name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  docker-publish:
    name: Docker ${{ matrix.name }}
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            file: apps/web/Dockerfile
            image: ghcr.io/auxx-ai/web
          - name: api
            file: apps/api/Dockerfile
            image: ghcr.io/auxx-ai/api
          - name: build
            file: apps/build/Dockerfile
            image: ghcr.io/auxx-ai/build
          - name: worker
            file: apps/worker/Dockerfile
            image: ghcr.io/auxx-ai/worker
          - name: lambda
            file: apps/lambda/Dockerfile
            image: ghcr.io/auxx-ai/lambda
          - name: lambda-server
            file: apps/lambda/Dockerfile.server
            image: ghcr.io/auxx-ai/lambda-server
          - name: homepage
            file: apps/homepage/Dockerfile
            image: ghcr.io/auxx-ai/homepage
          - name: docs
            file: apps/docs/Dockerfile
            image: ghcr.io/auxx-ai/docs
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h /

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build time
        id: build_time
        run: echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64
          pull: true
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ needs.release-please.outputs.tag_name }}
            ${{ matrix.image }}:${{ needs.release-please.outputs.version }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            APP_VERSION=${{ needs.release-please.outputs.version }}
            BUILD_TIME=${{ steps.build_time.outputs.build_time }}
            POSTHOG_KEY=${{ vars.POSTHOG_KEY }}
            POSTHOG_HOST=${{ vars.POSTHOG_HOST }}
          cache-from: type=registry,ref=${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ matrix.image }}:buildcache,mode=max

  sst-platform-deploy:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/sst-deploy-platform.yml
    secrets: inherit

  railway-deploy:
    name: Deploy to Railway
    needs: [release-please, docker-publish, sst-platform-deploy]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to auxx-infra
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.AUXX_INFRA_TOKEN }}
          repository: Auxx-Ai/auxx-infra
          event-type: deploy-railway
          client-payload: >-
            {
              "stage": "dev",
              "version": "${{ needs.release-please.outputs.version }}",
              "tag_name": "${{ needs.release-please.outputs.tag_name }}",
              "sha": "${{ github.sha }}",
              "triggered_by": "${{ github.actor }}"
            }
