# .github/workflows/release-please.yml
name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  docker-publish:
    name: Docker ${{ matrix.name }}
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            file: apps/web/Dockerfile
            image: ghcr.io/auxx-ai/web
          - name: api
            file: apps/api/Dockerfile
            image: ghcr.io/auxx-ai/api
          - name: build
            file: apps/build/Dockerfile
            image: ghcr.io/auxx-ai/build
          - name: worker
            file: apps/worker/Dockerfile
            image: ghcr.io/auxx-ai/worker
          - name: lambda
            file: apps/lambda/Dockerfile
            image: ghcr.io/auxx-ai/lambda
          - name: lambda-server
            file: apps/lambda/Dockerfile.server
            image: ghcr.io/auxx-ai/lambda-server
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h /

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build time
        id: build_time
        run: echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64
          pull: true
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ needs.release-please.outputs.tag_name }}
            ${{ matrix.image }}:${{ needs.release-please.outputs.version }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            APP_VERSION=${{ needs.release-please.outputs.version }}
            BUILD_TIME=${{ steps.build_time.outputs.build_time }}
          cache-from: type=registry,ref=${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ matrix.image }}:buildcache,mode=max

  sst-deploy:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/sst-deploy.yml
    secrets: inherit
