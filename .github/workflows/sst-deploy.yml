          echo "NEXT_PUBLIC_S3_BUCKET=${{ vars.NEXT_PUBLIC_S3_BUCKET }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_PUSHER_KEY=${{ vars.NEXT_PUBLIC_PUSHER_KEY }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_PUSHER_CLUSTER=${{ vars.NEXT_PUBLIC_PUSHER_CLUSTER }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_POSTHOG_KEY=${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_POSTHOG_HOST=${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}" >> $GITHUB_ENV
          # Storage & data
          echo "REDIS_HOST=${{ vars.REDIS_HOST }}" >> $GITHUB_ENV
          echo "REDIS_PORT=${{ vars.REDIS_PORT }}" >> $GITHUB_ENV
