          TASK_DEF=$(aws ecs describe-services --cluster "$CLUSTER_REF" --services "$SERVICE_REF" --query 'services[0].taskDefinition' --output text 2>/dev/null)
          if [ -z "$TASK_DEF" ] || [ "$TASK_DEF" = "None" ]; then
            echo "Could not resolve DbMigrate service ($DB_MIGRATE_SERVICE). Listing services to find a match..."
            SERVICES=$(aws ecs list-services --cluster "$CLUSTER_REF" --query 'serviceArns[]' --output text | tr '\t' '\n')
            for SVC_ARN in $SERVICES; do
              NAME=$(basename "$SVC_ARN")
              if echo "$NAME" | grep -qi 'DbMigrate'; then
                DB_MIGRATE_SERVICE="$NAME"
                TASK_DEF=$(aws ecs describe-services --cluster "$CLUSTER_REF" --services "$DB_MIGRATE_SERVICE" --query 'services[0].taskDefinition' --output text)
                break
              fi
            done
          fi
          if [ -z "$TASK_DEF" ] || [ "$TASK_DEF" = "None" ]; then
            echo "Migration service not found; skipping migrations."
            exit 1
          fi
          echo "TASK_DEF=$TASK_DEF"
          WORKER_SERVICE=${WORKER_SERVICE_ARN:-"auxx-ai-${STAGE}-AppWorker"}
          WORKER_SG=$(aws ecs describe-services --cluster "$CLUSTER_REF" --services "$WORKER_SERVICE" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.securityGroups' --output text 2>/dev/null || true)
          if [ -n "$WORKER_SG" ] && [ "$WORKER_SG" != "None" ]; then
            NET_CONF="awsvpcConfiguration={subnets=[$APP_PRIVATE_SUBNETS],securityGroups=[$WORKER_SG],assignPublicIp=DISABLED}"
          else
            NET_CONF="awsvpcConfiguration={subnets=[$APP_PRIVATE_SUBNETS],assignPublicIp=DISABLED}"
          fi
          TASK_ARN=$(aws ecs run-task --cluster "$CLUSTER_REF" --launch-type FARGATE --task-definition "$TASK_DEF" --network-configuration "$NET_CONF" --query 'tasks[0].taskArn' --output text)
          echo "TASK_ARN=$TASK_ARN"
          aws ecs wait tasks-stopped --cluster "$CLUSTER_REF" --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks --cluster "$CLUSTER_REF" --tasks "$TASK_ARN" --query 'tasks[0].containers[0].exitCode' --output text)
          echo "EXIT_CODE=$EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration task failed"
            exit 1
          fi
      # (removed duplicate prod migration step; above step handles ARNs + fallbacks)
  deploy-infra-prod:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Deploy infra (prod)
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::486437023232:role/AuxxGithubDeployRole
          aws-region: us-west-1
      - name: Install deps
        run: pnpm i --frozen-lockfile=false
      - name: Deploy infra (prod)
        working-directory: infra/infra-sst
        env:
          AWS_REGION: us-west-1
          STAGE: prod
        run: pnpm sst:deploy -- --stage=${STAGE}
