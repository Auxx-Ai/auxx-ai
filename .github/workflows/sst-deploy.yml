          echo "ECS_CLUSTER_NAME=$ECS_CLUSTER_NAME" >> $GITHUB_ENV
          echo "DB_MIGRATE_SERVICE=$DB_MIGRATE_SERVICE" >> $GITHUB_ENV
          echo "ECS_CLUSTER_ARN=$ECS_CLUSTER_ARN" >> $GITHUB_ENV
          echo "DB_MIGRATE_SERVICE_ARN=$DB_MIGRATE_SERVICE_ARN" >> $GITHUB_ENV
          echo "WORKER_SERVICE_ARN=$WORKER_SERVICE_ARN" >> $GITHUB_ENV
          if [ -z "$APP_PRIVATE_SUBNETS" ] && [ -n "$APP_PRIVATE_SUBNETS_FROM_APP" ]; then
            echo "APP_PRIVATE_SUBNETS=$APP_PRIVATE_SUBNETS_FROM_APP" >> $GITHUB_ENV
          fi
          if [ -z "$APP_PUBLIC_SUBNETS" ] && [ -n "$APP_PUBLIC_SUBNETS_FROM_APP" ]; then
            echo "APP_PUBLIC_SUBNETS=$APP_PUBLIC_SUBNETS_FROM_APP" >> $GITHUB_ENV
          fi

      - name: Validate app outputs (prod)
        run: |
          errs=0
          for v in ECS_CLUSTER_ARN DB_MIGRATE_SERVICE_ARN WORKER_SERVICE_ARN; do
            val=$(printenv $v)
            if [ -z "$val" ] || [ "$val" = "None" ]; then
              echo "Missing required output: $v"
