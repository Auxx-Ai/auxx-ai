          echo "${{ secrets.GOOGLE_PRIVATE_KEY }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          # OAuth (add others as needed)
          echo "AUTH_GOOGLE_ID=${{ vars.AUTH_GOOGLE_ID }}" >> $GITHUB_ENV
