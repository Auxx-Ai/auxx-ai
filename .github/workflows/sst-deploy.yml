            --output text 2>/dev/null)
          if [ $? -eq 0 ] && [ -n "$OUT" ]; then
            APP_VPC_ID=$(echo "$OUT" | awk '$1=="vpcId"{print $2}')
            APP_PRIVATE_SUBNETS=$(echo "$OUT" | awk '$1=="privateSubnets"{print $2}')
            APP_PUBLIC_SUBNETS=$(echo "$OUT" | awk '$1=="publicSubnets"{print $2}')
            echo "APP_VPC_ID=$APP_VPC_ID" >> $GITHUB_ENV
            echo "APP_PRIVATE_SUBNETS=$APP_PRIVATE_SUBNETS" >> $GITHUB_ENV
            echo "APP_PUBLIC_SUBNETS=$APP_PUBLIC_SUBNETS" >> $GITHUB_ENV
            echo "Using shared VPC: $APP_VPC_ID"
          else
            echo "CloudFormation stack $STACK_NAME not found. Proceeding without shared VPC; app will create its own."
          fi

      # moved to after deploy

      - name: Export environment variables (prod)
        run: |
          echo "STAGE=prod" >> $GITHUB_ENV
          echo "AWS_REGION=us-west-1" >> $GITHUB_ENV
          echo "CLOUDFRONT_CERT_ARN=${{ vars.CLOUDFRONT_CERT_ARN }}" >> $GITHUB_ENV
