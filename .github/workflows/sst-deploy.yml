# .github/workflows/sst-deploy.yml
name: SST Deploy

on:
  workflow_call:
    inputs:
      stage:
        description: SST stage to deploy
        required: false
        type: string
        default: dev
      lock_wait_seconds:
        description: Seconds to wait before retrying after lock contention
        required: false
        type: number
        default: 90
      lock_max_attempts:
        description: Number of deploy attempts when lock contention is detected
        required: false
        type: number
        default: 3
      auto_unlock_on_final_lock:
        description: If true, run unlock and do one final deploy retry when lock retries are exhausted
        required: false
        type: boolean
        default: true
      post_unlock_wait_seconds:
        description: Seconds to wait after unlock before the final deploy retry
        required: false
        type: number
        default: 15
  workflow_dispatch:
    inputs:
      stage:
        description: SST stage to deploy
        required: true
        default: dev
        type: string
      force_unlock_before_deploy:
        description: Unlock stage before deploy (use only when no active deploy is running)
        required: false
        default: false
        type: boolean
      lock_wait_seconds:
        description: Seconds to wait before retrying after lock contention
        required: false
        default: 90
        type: number
      lock_max_attempts:
        description: Number of deploy attempts when lock contention is detected
        required: false
        default: 3
        type: number
      auto_unlock_on_final_lock:
        description: If true, run unlock and do one final deploy retry when lock retries are exhausted
        required: false
        default: true
        type: boolean
      post_unlock_wait_seconds:
        description: Seconds to wait after unlock before the final deploy retry
        required: false
        default: 15
        type: number

concurrency:
  group: sst-state-${{ inputs.stage || 'dev' }}
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: Deploy dev (us-west-1)
    runs-on: ubuntu-latest
    environment: dev
    env:
      STAGE: ${{ inputs.stage || 'dev' }}
      AWS_REGION: us-west-1
      SST_APP_NAME: auxxai-app
      EXPECTED_AWS_ACCOUNT_ID: '716542960845'
      AWS_DEPLOY_ROLE_ARN: arn:aws:iam::716542960845:role/AuxxGithubDeployRole
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: |
          set -euo pipefail
          ASSUMED_ARN=$(aws sts get-caller-identity --query 'Arn' --output text)
          ACTUAL_ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)
          echo "Assumed identity: $ASSUMED_ARN"
          echo "Expected account: ${EXPECTED_AWS_ACCOUNT_ID}"
          if [ "$ACTUAL_ACCOUNT_ID" != "${EXPECTED_AWS_ACCOUNT_ID}" ]; then
            echo "ERROR: Account mismatch. CI is running in account $ACTUAL_ACCOUNT_ID but expected ${EXPECTED_AWS_ACCOUNT_ID}."
            echo "Check OIDC role trust and role-to-assume configuration."
            exit 1
          fi

      - name: Debug SST state access
        run: |
          set -euo pipefail
          echo "=== SST state bucket ==="
          aws s3 ls --region "$AWS_REGION" | grep sst-state || echo "NO STATE BUCKET FOUND"

          echo "=== SST passphrase ==="
          aws ssm get-parameter --name "/sst/passphrase/${SST_APP_NAME}/${STAGE}" --region "$AWS_REGION" \
            --query 'Parameter.Name' --output text 2>&1 || echo "CANNOT ACCESS PASSPHRASE"

          echo "=== SST bootstrap ==="
          aws ssm get-parameter --name "/sst/bootstrap" --region "$AWS_REGION" \
            --query 'Parameter.Value' --output text 2>&1 || echo "NO BOOTSTRAP PARAMETER"

          echo "=== SST asset bucket ==="
          aws s3 ls --region "$AWS_REGION" | grep sst-asset || echo "NO ASSET BUCKET FOUND"

      - name: Install deps
        run: pnpm i --frozen-lockfile=false

      - name: Check next.config safety
        run: pnpm run check:next-config-safety

      - name: Build workspace packages
        run: pnpm --filter @auxx/services build

      - name: Check OpenNext build (web)
        run: pnpm run check:opennext:web

      - name: Check OpenNext build (docs)
        run: pnpm run check:opennext:docs

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.1.4"

      - name: Build Lambda bootstrap binary
        run: pnpm --filter @auxx/lambda build

      - name: Ensure ECR repository exists (sst-asset)
        env:
          AWS_REGION: us-west-1
        run: |
          set -e
          aws ecr describe-repositories --repository-names sst-asset >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name sst-asset --image-scanning-configuration scanOnPush=true --encryption-configuration encryptionType=AES256

      - name: Export environment variables (dev)
        run: |
          echo "GIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
          echo "APP_VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          echo "STAGE=${STAGE}" >> $GITHUB_ENV
          echo "AWS_REGION=${AWS_REGION}" >> $GITHUB_ENV
          echo "CLOUDFRONT_CERT_ARN=${{ vars.CLOUDFRONT_CERT_ARN }}" >> $GITHUB_ENV
          # Temporary DB URL for build-time env validation only; not used at runtime
          echo "DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder" >> $GITHUB_ENV
          # Public envs
          echo "NEXT_PUBLIC_BASE_URL=${{ vars.NEXT_PUBLIC_BASE_URL }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}" >> $GITHUB_ENV
          echo "POSTHOG_KEY=${{ vars.POSTHOG_KEY }}" >> $GITHUB_ENV
          echo "POSTHOG_HOST=${{ vars.POSTHOG_HOST }}" >> $GITHUB_ENV
          echo "STRIPE_PUBLISHABLE_KEY=${{ vars.STRIPE_PUBLISHABLE_KEY }}" >> $GITHUB_ENV
          # Storage & data
          echo "REDIS_HOST=${{ vars.REDIS_HOST }}" >> $GITHUB_ENV
          echo "REDIS_PORT=${{ vars.REDIS_PORT }}" >> $GITHUB_ENV
          echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> $GITHUB_ENV
          # Providers / secrets
          echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" >> $GITHUB_ENV
          echo "STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}" >> $GITHUB_ENV
          echo "MAILGUN_API_KEY=${{ secrets.MAILGUN_API_KEY }}" >> $GITHUB_ENV
          echo "MAILGUN_DOMAIN=${{ vars.MAILGUN_DOMAIN }}" >> $GITHUB_ENV
          echo "MAILGUN_REGION=${{ vars.MAILGUN_REGION }}" >> $GITHUB_ENV
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> $GITHUB_ENV
          echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" >> $GITHUB_ENV
          echo "PUSHER_APP_ID=${{ vars.PUSHER_APP_ID }}" >> $GITHUB_ENV
          echo "PUSHER_KEY=${{ vars.PUSHER_KEY }}" >> $GITHUB_ENV
          echo "PUSHER_SECRET=${{ secrets.PUSHER_SECRET }}" >> $GITHUB_ENV
          echo "PUSHER_CLUSTER=${{ vars.PUSHER_CLUSTER }}" >> $GITHUB_ENV
          echo "SYSTEM_FROM_EMAIL=${{ vars.SYSTEM_FROM_EMAIL }}" >> $GITHUB_ENV
          echo "SUPPORT_EMAIL=${{ vars.SUPPORT_EMAIL }}" >> $GITHUB_ENV
          echo "SUPPORT_NAME=${{ vars.SUPPORT_NAME }}" >> $GITHUB_ENV
          # BetterAuth
          echo "BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}" >> $GITHUB_ENV
          # Google Service Account (multiline key support)
          echo "GOOGLE_CLIENT_EMAIL=${{ secrets.GOOGLE_CLIENT_EMAIL }}" >> $GITHUB_ENV
          echo "GOOGLE_PROJECT_ID=${{ secrets.GOOGLE_PROJECT_ID }}" >> $GITHUB_ENV
          echo "GOOGLE_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
          echo "${{ secrets.GOOGLE_PRIVATE_KEY }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          # OAuth (add others as needed)
          echo "AUTH_GOOGLE_ID=${{ vars.AUTH_GOOGLE_ID }}" >> $GITHUB_ENV
          echo "AUTH_GOOGLE_SECRET=${{ secrets.AUTH_GOOGLE_SECRET }}" >> $GITHUB_ENV
          # Auth URL
          echo "AUTH_URL=${{ vars.NEXT_PUBLIC_BASE_URL }}" >> $GITHUB_ENV

      - name: Remove system Pulumi (avoid version conflict with SST)
        run: rm -f /usr/local/bin/pulumi*

      - name: Optional pre-deploy unlock (manual dispatch only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.force_unlock_before_deploy == true }}
        run: pnpm exec sst unlock --stage="${STAGE}"

      - name: Deploy dev (lock-aware retry)
        env:
          SST_PRINT_LOGS: '1'
          PULUMI_MAX_CONCURRENT_REQUESTS: '20'
          SST_TELEMETRY_DISABLED: '1'
          SST_DEPLOY_CMD: 'pnpm sst:deploy'
          SST_LOCK_WAIT_SECONDS: '${{ inputs.lock_wait_seconds || 90 }}'
          SST_LOCK_MAX_ATTEMPTS: '${{ inputs.lock_max_attempts || 3 }}'
          SST_LOCK_AUTO_UNLOCK_ON_FINAL_LOCK: '${{ inputs.auto_unlock_on_final_lock || true }}'
          SST_LOCK_POST_UNLOCK_WAIT_SECONDS: '${{ inputs.post_unlock_wait_seconds || 15 }}'
          SST_UNLOCK_CMD: 'pnpm exec sst unlock --stage=${STAGE}'
          SST_ENABLE_SIGNAL_UNLOCK_TRAP: 'true'
        run: bash scripts/ci/sst-deploy-with-lock-retry.sh

      - name: Run DB migrations (dev)
        env:
          AWS_REGION: us-west-1
          STAGE: ${{ inputs.stage || 'dev' }}
        run: |
          # Get the migration Lambda function name from SST outputs
          FUNC_NAME=$(aws cloudformation describe-stacks \
            --stack-name "auxxai-app-${STAGE}" \
            --query 'Stacks[0].Outputs[?contains(OutputKey, `databaseDeployFunctionName`)].OutputValue' \
            --output text 2>/dev/null || true)

          if [ -z "$FUNC_NAME" ] || [ "$FUNC_NAME" = "None" ]; then
            echo "WARNING: Could not find migration function in stack outputs. Skipping."
            exit 0
          fi

          echo "Invoking migration Lambda: $FUNC_NAME"
          INVOKE_OUTPUT=$(aws lambda invoke \
            --function-name "$FUNC_NAME" \
            --payload '{"action":"migrate"}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/migrate-response.json)

          echo "Invoke metadata: $INVOKE_OUTPUT"
          echo "Lambda response:"
          cat /tmp/migrate-response.json

          # Check for Lambda-level errors (FunctionError appears in invoke metadata)
          if echo "$INVOKE_OUTPUT" | grep -q "FunctionError"; then
            echo "Migration failed!"
            exit 1
          fi

          echo "Migrations completed successfully."
