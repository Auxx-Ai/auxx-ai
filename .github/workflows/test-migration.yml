name: Test Database Migration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run migrations in'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production

env:
  AWS_REGION: us-east-1

permissions:
  contents: read
  id-token: write

jobs:
  run-migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch network values
        id: net
        run: |
          ENV=${{ inputs.environment }}

          SUBNETS=$(aws cloudformation list-exports \
            --query "Exports[?Name=='auxx-${ENV}-private-subnet-ids'].Value" \
            --output text)
          SG=$(aws cloudformation list-exports \
            --query "Exports[?Name=='auxx-${ENV}-service-sg-id'].Value" \
            --output text)
            
          # Ensure log group exists
          LOG_GROUP="/ecs/auxx-${ENV}-migrate"
          aws logs create-log-group --log-group-name "$LOG_GROUP" 2>/dev/null || true

          echo "subnets=$SUBNETS" >> "$GITHUB_OUTPUT"
          echo "sg=$SG" >> "$GITHUB_OUTPUT"

          # Get task definition details
          echo "Task definition details:"
          aws ecs describe-task-definition --task-definition "auxx-${ENV}-migrate" --query "taskDefinition.{ExecutionRole:executionRoleArn,TaskRole:taskRoleArn,Family:family}" --output json

          # Test if we can assume the roles
          EXECUTION_ROLE=$(aws ecs describe-task-definition --task-definition "auxx-${ENV}-migrate" --query "taskDefinition.executionRoleArn" --output text)
          ROLE_NAME=$(echo $EXECUTION_ROLE | awk -F'/' '{print $NF}')

          echo "Testing if role $ROLE_NAME exists..."
          aws iam get-role --role-name "$ROLE_NAME" --query "Role.{Arn:Arn,TrustPolicy:AssumeRolePolicyDocument}" --output json || echo "Role not found or insufficient permissions"

      - name: Run migration task
        run: |
          ENV=${{ inputs.environment }}
          echo "Environment: $ENV"
          CLUSTER=auxx-${ENV}-cluster
          TASK_DEF=auxx-${ENV}-migrate
          LOG_GROUP="/ecs/auxx-${ENV}-migrate"

          echo "Starting migration task in cluster $CLUSTER with task definition $TASK_DEF"

          # Run the task
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.net.outputs.subnets }}],securityGroups=[${{ steps.net.outputs.sg }}],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' --output text)
            
          if [ -z "$TASK_ARN" ]; then
            echo "Failed to start migration task."
            exit 1
          fi

          echo "Task ARN: $TASK_ARN"
          echo "Waiting for migration task to finish..."
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"

          TASK_ID=$(echo $TASK_ARN | cut -d'/' -f3)
          LOG_STREAM="${ENV}-migrate/$TASK_ID"

          echo "Task completed. Checking status..."

          EXIT_CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
            
          echo "Task exit code: $EXIT_CODE"
      # Add this to your workflow to create a debug task
      - name: Verify IAM roles
        run: |
          ENV=${{ inputs.environment }}

          # Check if the roles exist
          echo "Checking for task role..."
          TASK_ROLE="auxx-${ENV}-migrate-task"
          EXECUTION_ROLE="auxx-${ENV}-migrate-execution"

          aws iam get-role --role-name "$TASK_ROLE" || echo "Task role does not exist!"
          aws iam get-role --role-name "$EXECUTION_ROLE" || echo "Execution role does not exist!"

          # Check trust relationship
          echo "Checking trust relationship..."
          aws iam get-role --role-name "$TASK_ROLE" --query "Role.AssumeRolePolicyDocument" --output json
