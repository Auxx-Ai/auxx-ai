# docker-compose.dev.yml
# Development-specific Docker Compose configuration

services:
  # PostgreSQL Database with pgvector
  postgres:
    image: ankane/pgvector:latest
    container_name: auxx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-c2J-k5wYf5CxmJDU}
      POSTGRES_DB: auxx-ai
    ports:
      - '${DATABASE_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auxx-network

  # Redis Cache
  redis:
    image: redis:alpine
    container_name: auxx-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-c2J-k5wYf5CxmJDU}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auxx-network

  # Web Application (Development)
  web:
    image: node:22-alpine
    container_name: auxx-web
    working_dir: /app
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${DATABASE_PASSWORD:-c2J-k5wYf5CxmJDU}@postgres:5432/auxx-ai
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-c2J-k5wYf5CxmJDU}
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auxx-network
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    command: sh -c "npm install -g pnpm && pnpm install && pnpm --filter web dev"

  # Worker Service (Development)
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    image: auxx-ai-worker:dev
    container_name: auxx-worker
    # working_dir is set in Dockerfile
    restart: unless-stopped
    ports:
      - '${WORKER_PORT:-8080}:8080'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${DATABASE_PASSWORD:-c2J-k5wYf5CxmJDU}@postgres:5432/auxx-ai
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-c2J-k5wYf5CxmJDU}
      NODE_ENV: development
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auxx-network
    # Removed volumes and command to use the built image
    # For development with hot reload, uncomment these:
    # volumes:
    #   - .:/app
    #   - /app/node_modules
    #   - /app/apps/worker/node_modules
    # command: sh -c "npm install -g pnpm && pnpm install && pnpm --filter worker dev"

  # Knowledge Base (KB) Application (Development)
  kb:
    image: node:22-alpine
    container_name: auxx-kb
    working_dir: /app
    restart: unless-stopped
    ports:
      - '${KB_PORT:-3002}:3002'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${DATABASE_PASSWORD:-c2J-k5wYf5CxmJDU}@postgres:5432/auxx-ai
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-c2J-k5wYf5CxmJDU}
      NODE_ENV: development
      PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auxx-network
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/kb/node_modules
      - /app/apps/kb/.next
    command: sh -c "npm install -g pnpm && pnpm install && pnpm --filter kb dev"

  # Documentation Site (Development)
  docs:
    image: node:22-alpine
    container_name: auxx-docs
    working_dir: /app
    restart: unless-stopped
    ports:
      - '${DOCS_PORT:-3004}:3004'
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3004
    networks:
      - auxx-network
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/docs/node_modules
      - /app/apps/docs/.next
    command: sh -c "npm install -g pnpm && pnpm install && pnpm --filter docs dev"

volumes:
  postgres_data:
  redis_data:

networks:
  auxx-network:
    driver: bridge
