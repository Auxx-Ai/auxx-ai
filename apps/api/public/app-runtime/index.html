<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auxx Extension Runtime</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell',
          'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #auxx-root {
        width: 100%;
        height: 100%;
        position: relative;
      }

      /* Loading state */
      .auxx-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        color: #666;
        font-size: 14px;
      }

      /* Error state */
      .auxx-error {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        padding: 20px;
        color: #d32f2f;
        font-size: 14px;
        text-align: center;
      }

      .auxx-error-title {
        font-weight: 600;
        margin-bottom: 8px;
      }

      .auxx-error-message {
        color: #666;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <!-- Root element where extension renders -->
    <div id="auxx-root">
      <div class="auxx-loading">Loading extension...</div>
    </div>

    <!-- Platform Runtime Bundle (same for ALL extensions) -->
    <!-- Hash is replaced during build: platform.{HASH}.js -->
    <script src="/api/v1/app-runtime/platform.c0ff65ee.js"></script>

    <!-- Extension bundle will be loaded dynamically by platform runtime -->
  </body>
</html>
