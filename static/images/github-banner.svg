<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#74b9ff"/>
      <stop offset="100%" stop-color="#5b9aff"/>
    </linearGradient>
<filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#74b9ff" flood-opacity="0.3"/>
    </filter>
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#74b9ff" flood-opacity="0.2"/>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Decorative dots -->
  <circle cx="180" cy="120" r="2" fill="#74b9ff" opacity="0.3"/>
  <circle cx="220" cy="180" r="1.5" fill="#74b9ff" opacity="0.2"/>
  <circle cx="1060" cy="140" r="2" fill="#74b9ff" opacity="0.25"/>
  <circle cx="1100" cy="500" r="1.5" fill="#74b9ff" opacity="0.2"/>
  <circle cx="150" cy="480" r="2" fill="#74b9ff" opacity="0.15"/>
  <circle cx="1150" cy="200" r="1" fill="#74b9ff" opacity="0.3"/>

  <!-- Logo icon -->
  <g transform="translate(640, 220)" filter="url(#logoShadow)">
    <!-- Blue circle -->
    <circle cx="0" cy="0" r="72" fill="url(#accent)"/>
    <!-- Roof chevron -->
    <path d="M-40 8 L0 -32 L40 8" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Grid squares -->
    <rect x="-24" y="2" width="20" height="20" rx="2" fill="white"/>
    <rect x="4" y="2" width="20" height="20" rx="2" fill="white"/>
    <rect x="4" y="28" width="20" height="20" rx="2" fill="white"/>
  </g>

  <!-- Title -->
  <text x="640" y="360" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="white" filter="url(#textGlow)" letter-spacing="-1">
    auxx.ai
  </text>

  <!-- Tagline -->
  <text x="640" y="410" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" fill="#8899bb" font-weight="400" letter-spacing="0.5">
    The Open Source AI-Powered CRM
  </text>

  <!-- Bottom border accent line -->
  <rect x="440" y="630" width="400" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>
</svg>
